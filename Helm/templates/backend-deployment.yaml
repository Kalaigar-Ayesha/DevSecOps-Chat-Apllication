apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatapp.fullname" . }}-backend
spec:
  replicas: {{ .Values.backend.replicas }}

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MongoDB..."
              until nc -z {{ include "chatapp.fullname" . }}-mongo 27017; do
                echo "MongoDB not ready..."
                sleep 3
              done
              echo "MongoDB ready!"

      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          imagePullPolicy: Always

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

          ports:
            - containerPort:  {{ .Values.service.backendPort }}

          envFrom:
            - configMapRef:
                name: {{ include "chatapp.fullname" . }}-backend-config

          env:
            - name: PORT
              value: "5000"

            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "chatapp.fullname" . }}-backend-secret
                  key: MONGODB_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "chatapp.fullname" . }}-backend-secret
                  key: JWT_SECRET

            - name: CLIENT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "chatapp.fullname" . }}-backend-secret
                  key: CLIENT_URL

          startupProbe:
            httpGet:
              path: /health
              port: 5000
            failureThreshold: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 40
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10

          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}

          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp

      volumes:
        - name: tmp-volume
          emptyDir: {}