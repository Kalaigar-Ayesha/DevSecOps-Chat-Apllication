# Centralized Logging Stack Configuration
# Loki, Promtail, and Grafana Integration

# Loki Configuration
loki:
  enabled: true
  
  # Image configuration
  image:
    repository: grafana/loki
    tag: 2.9.4
    pullPolicy: IfNotPresent
  
  # Service configuration
  service:
    type: ClusterIP
    port: 3100
    targetPort: http
    
  # Ingress configuration
  ingress:
    enabled: false
    hosts: []
    
  # Persistence configuration
  persistence:
    enabled: true
    storageClassName: standard
    accessModes: ["ReadWriteOnce"]
    size: 50Gi
    
  # Resource configuration
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
      
  # Loki configuration
  config:
    auth_enabled: false
    
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      
    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        final_sleep: 0s
      chunk_idle_period: 1h
      max_chunk_age: 1h
      chunk_target_size: 1048576
      chunk_retain_period: 30s
      max_transfer_retries: 0
      
    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_cache_freshness_per_query: 10m
      
    schema_config:
      configs:
      - from: 2020-10-24
        store: boltdb-shipper
        object_store: filesystem
        schema: v11
        index:
          prefix: index_
          period: 24h
          
    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/boltdb-shipper-active
        cache_location: /loki/boltdb-shipper-cache
        shared_store: filesystem
      filesystem:
        directory: /loki/chunks
        
    chunk_store_config:
      max_look_back_period: 0s
      
    table_manager:
      retention_deletes_enabled: false
      retention_period: 0s
      
    query_range:
      split_queries_by_interval: 15m
      cache_results: true
      results_cache:
        cache:
          enable_fifocache: true
          fifocache:
            max_size_bytes: 1GB
            ttl: 24h
            
    frontend:
      max_outstanding_per_tenant: 2048
      compress_responses: true
      
    querier:
      query_ingesters_within: 12h
      
    # Log retention configuration
    limits_config:
      retention_period: 30d
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      per_stream_rate_limit: 16MB
      per_stream_rate_limit_burst: 32MB
      
  # Node selector and tolerations
  nodeSelector:
    kubernetes.io/os: linux
    
  tolerations:
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
    
  # Affinity
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - loki
          topologyKey: kubernetes.io/hostname

# Promtail Configuration
promtail:
  enabled: true
  
  # Image configuration
  image:
    repository: grafana/promtail
    tag: 2.9.4
    pullPolicy: IfNotPresent
    
  # Resource configuration
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
      
  # Promtail configuration
  config:
    server:
      http_listen_port: 3101
      grpc_listen_port: 0
      
    clients:
    - url: http://loki:3100/loki/api/v1/push
      
    positions:
      filename: /tmp/positions.yaml
      
    scrape_configs:
    # Systemd logs
    - job_name: systemd
      systemd:
        path: /var/log/journal
        namespace: chat-app
      relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
      - source_labels: ['__journal__hostname']
        target_label: 'hostname'
      - source_labels: ['__journal_priority_keyword']
        target_label: 'level'
        
    # Container logs
    - job_name: containers
      static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/log/containers/*chat-app*.log
          
      pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          source: attrs
          expressions:
            tag:
      - regex:
          source: tag
          expression: '^(?P<namespace_name>[^_]+)_(?P<pod_name>[^_]+)_(?P<container_name>.+)$'
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
          namespace_name:
          pod_name:
          container_name:
      - output:
          source: output
          
    # Kubernetes API server logs
    - job_name: kubernetes-apiserver
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - kube-system
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: kube-apiserver
      - source_labels: [__meta_kubernetes_pod_container_name]
        action: keep
        regex: kube-apiserver
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: ${1}:10250
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
        
    # Kubernetes events
    - job_name: kubernetes-events
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - default
          - chat-app
          - monitoring
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
        
  # Node selector and tolerations
  nodeSelector:
    kubernetes.io/os: linux
    
  tolerations:
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
    
  # DaemonSet configuration
  daemonset:
    enabled: true
    updateStrategy:
      type: RollingUpdate
      
  # Security context
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    
  # Service account
  serviceAccount:
    create: true
    name: promtail
    annotations:
      iam.amazonaws.com/role: "promtail-role"

# Grafana Configuration (for Loki integration)
grafana:
  enabled: true
  
  # Sidecar configuration for Loki datasource
  sidecar:
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
      label: grafana_datasource
      labelValue: "1"
      
  # Grafana configuration
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
      
    auth:
      disable_login_form: false
      
    auth.anonymous:
      enabled: false
      
    users:
      allow_sign_up: false
      
    security:
      allow_embedding: false
      
  # Data sources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
        editable: true
        jsonData:
          maxLines: 1000
          derivedFields:
          - datasourceUid: prometheus
            matcherRegex: ".*\"trace_id\":\"(\\w+)\".*"
            name: TraceID
            url: "$${__value.raw}"
            
# Filebeat alternative (optional)
filebeat:
  enabled: false
  
# Fluent-bit alternative (optional)  
fluent-bit:
  enabled: false
  
# Network policies
networkPolicy:
  enabled: false
  
# Pod security policies
podSecurityPolicy:
  enabled: false
