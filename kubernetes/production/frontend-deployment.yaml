---
# Production-Grade Frontend Deployment
# MERN Chat Application Frontend with comprehensive reliability features

apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-app-frontend
  namespace: chat-app
  labels:
    app: chat-app-frontend
    version: v1
    component: frontend
    tier: application
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubernetes.io/description: "Chat Application Frontend React App"

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
      progressDeadlineSeconds: 600
  
  selector:
    matchLabels:
      app: chat-app-frontend
      version: v1
  
  template:
    metadata:
      labels:
        app: chat-app-frontend
        version: v1
        component: frontend
        tier: application
      annotations:
        sidecar.istio.io/inject: "false"
        
    spec:
      serviceAccountName: chat-app-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        
      containers:
      - name: chat-app-frontend
        image: chat-app-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
          
        # Resource requests and limits
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
            
        # Environment variables
        env:
        - name: NODE_ENV
          value: "production"
        - name: REACT_APP_API_URL
          value: "https://api.chatapp.com"
        - name: REACT_APP_WS_URL
          value: "wss://api.chatapp.com"
        - name: REACT_APP_VERSION
          value: "1.0.0"
          
        # Liveness Probe
        livenessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
            httpHeaders:
            - name: User-Agent
              value: "Kubernetes-Liveness-Probe"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
          
        # Readiness Probe
        readinessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
            httpHeaders:
            - name: User-Agent
              value: "Kubernetes-Readiness-Probe"
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
          
        # Startup Probe
        startupProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
            httpHeaders:
            - name: User-Agent
              value: "Kubernetes-Startup-Probe"
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30
          
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
          
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/nginx
          
      # Init containers
      initContainers:
      - name: init-backend-check
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          echo "Checking backend availability..."
          until nc -z chat-app-backend.chat-app.svc.cluster.local 3000; do
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend is ready!"
        resources:
          requests:
            cpu: 50m
            memory: 50Mi
          limits:
            cpu: 100m
            memory: 100Mi
            
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
        
      # Node selector and tolerations
      nodeSelector:
        kubernetes.io/os: linux
        node-type: application
        
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
        
      # Affinity rules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - chat-app-frontend
              topologyKey: kubernetes.io/hostname
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - frontend
              topologyKey: kubernetes.io/hostname
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 30
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname
              
      # Termination grace period
      terminationGracePeriodSeconds: 30
      
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chat-app-frontend-hpa
  namespace: chat-app
  labels:
    app: chat-app-frontend
    component: frontend
  annotations:
    autoscaling.alpha.kubernetes.io/conditions: '[{"type":"Ready","status":"True","lastTransitionTime":"2024-01-01T00:00:00Z"}]'

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chat-app-frontend
    
  minReplicas: 2
  maxReplicas: 6
  
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
        
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Max
---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chat-app-frontend-pdb
  namespace: chat-app
  labels:
    app: chat-app-frontend
    component: frontend
spec:
  minAvailable: 1
  maxUnavailable: 1
  selector:
    matchLabels:
      app: chat-app-frontend
---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chat-app-frontend
  namespace: chat-app
  annotations:
    iam.amazonaws.com/role: "chat-app-frontend-role"
automountServiceAccountToken: true
---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chat-app-frontend-netpol
  namespace: chat-app
  labels:
    app: chat-app-frontend
    component: frontend
spec:
  podSelector:
    matchLabels:
      app: chat-app-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: chat-app-backend
    ports:
    - protocol: TCP
      port: 3000
