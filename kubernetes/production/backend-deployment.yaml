---
# Production-Grade Backend Deployment
# MERN Chat Application Backend with comprehensive reliability features

apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-app-backend
  namespace: chat-app
  labels:
    app: chat-app-backend
    version: v1
    component: backend
    tier: application
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubernetes.io/description: "Chat Application Backend API Server"

spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
      progressDeadlineSeconds: 600
  
  selector:
    matchLabels:
      app: chat-app-backend
      version: v1
  
  template:
    metadata:
      labels:
        app: chat-app-backend
        version: v1
        component: backend
        tier: application
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
        prometheus.io/scheme: "http"
        sidecar.istio.io/inject: "false"
        
    spec:
      serviceAccountName: chat-app-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        
      containers:
      - name: chat-app-backend
        image: chat-app-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
          
        # Resource requests and limits
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
            
        # Environment variables
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: chat-app-secrets
              key: mongodb-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: chat-app-secrets
              key: jwt-secret
        - name: CLOUDINARY_URL
          valueFrom:
            secretKeyRef:
              name: chat-app-secrets
              key: cloudinary-url
        - name: CLOUDINARY_CLOUD_NAME
          valueFrom:
            secretKeyRef:
              name: chat-app-secrets
              key: cloudinary-cloud-name
        - name: CLOUDINARY_API_KEY
          valueFrom:
            secretKeyRef:
              name: chat-app-secrets
              key: cloudinary-api-key
        - name: CLOUDINARY_API_SECRET
          valueFrom:
            secretKeyRef:
              name: chat-app-secrets
              key: cloudinary-api-secret
        - name: OTEL_SERVICE_NAME
          value: "chat-app-backend"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.tracing:4317"
        - name: JAEGER_ENDPOINT
          value: "http://jaeger-collector.tracing:14250/api/traces"
          
        # Liveness Probe
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
          
        # Readiness Probe
        readinessProbe:
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
          
        # Startup Probe
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30
          
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
          
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /var/log/app
          
      # Init containers
      initContainers:
      - name: init-db-check
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          echo "Checking database connectivity..."
          until nc -z mongodb.chat-app.svc.cluster.local 27017; do
            echo "Waiting for MongoDB..."
            sleep 2
          done
          echo "MongoDB is ready!"
        resources:
          requests:
            cpu: 50m
            memory: 50Mi
          limits:
            cpu: 100m
            memory: 100Mi
            
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
        
      # Node selector and tolerations
      nodeSelector:
        kubernetes.io/os: linux
        node-type: application
        
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
        
      # Affinity rules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - chat-app-backend
              topologyKey: kubernetes.io/hostname
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - mongodb
              topologyKey: kubernetes.io/hostname
              
      # Termination grace period
      terminationGracePeriodSeconds: 30
      
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chat-app-backend-hpa
  namespace: chat-app
  labels:
    app: chat-app-backend
    component: backend
  annotations:
    autoscaling.alpha.kubernetes.io/conditions: '[{"type":"Ready","status":"True","lastTransitionTime":"2024-01-01T00:00:00Z"}]'

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chat-app-backend
    
  minReplicas: 2
  maxReplicas: 10
  
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
        
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Max
---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chat-app-backend-pdb
  namespace: chat-app
  labels:
    app: chat-app-backend
    component: backend
spec:
  minAvailable: 1
  maxUnavailable: 1
  selector:
    matchLabels:
      app: chat-app-backend
---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chat-app-backend
  namespace: chat-app
  annotations:
    iam.amazonaws.com/role: "chat-app-backend-role"
automountServiceAccountToken: true
---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chat-app-backend-netpol
  namespace: chat-app
  labels:
    app: chat-app-backend
    component: backend
spec:
  podSelector:
    matchLabels:
      app: chat-app-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: chat-app-frontend
    - podSelector:
        matchLabels:
          app: chat-app-backend
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: mongodb
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 27017
    - protocol: TCP
      port: 4317
    - protocol: TCP
      port: 14250
