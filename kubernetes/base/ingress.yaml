apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-app-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: chatapp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80