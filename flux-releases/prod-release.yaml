apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: GitRepository
metadata:
  name: chat-app-repo-prod
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/Kalaigar-Ayesha/DevSecOps-Chat-Apllication.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: chat-app-prod
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ./Helm
      sourceRef:
        kind: GitRepository
        name: chat-app-repo-prod
      interval: 1m
  targetNamespace: chat-app-prod
  install:
    createNamespace: true
  valuesFiles:
    - values.yaml
    - values-prod.yaml
