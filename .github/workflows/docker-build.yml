name: Docker Build

on:
  workflow_call:
    inputs:
      context:
        description: 'Directory context for docker build'
        required: true
        type: string
      image_name:
        description: 'Name of the docker image'
        required: true
        type: string
      tag:
        description: 'Tag for the docker image'
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for sigstore/cosign

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/Dockerfile
          push: true
          tags: ${{ inputs.image_name }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image_name }}:${{ inputs.tag }}
          artifact-name: sbom.spdx.json

      - name: Sign the published Docker image
        env:
          TAGS: ${{ inputs.image_name }}:${{ inputs.tag }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          # Sign the image digest
          cosign sign --yes "${{ inputs.image_name }}@${DIGEST}"
