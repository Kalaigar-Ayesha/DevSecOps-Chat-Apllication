# Enterprise-grade Prometheus and Grafana configuration
# kube-prometheus-stack Helm values

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# Prometheus Configuration
prometheus:
  enabled: true
  
  # Service configuration
  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090
    
  # Ingress configuration
  ingress:
    enabled: false
    hosts: []
    
  # Persistence configuration
  prometheusSpec:
    retention: 15d
    retentionSize: "50GB"
    
    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
              
    # Resource configuration
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
        
    # Service discovery configuration
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    probeSelectorNilUsesHelmValues: false
    probeSelector: {}
    probeNamespaceSelector: {}
    
    # Additional scrape configs
    additionalScrapeConfigs: []
    
    # Remote write configuration (for long-term storage)
    remoteWrite: []
    
    # Alertmanager configuration
    alertingEndpoints: []
    
    # External labels
    externalLabels:
      cluster: "chat-app-cluster"
      region: "us-west-2"
      
    # Rule files
    ruleFiles: []
    
    # Enable API server monitoring
    enableRemoteWriteReceiver: false
    
    # Enable features
    enableAdminAPI: false
    
    # Configuration for node-exporter
    nodeSelector:
      kubernetes.io/os: linux
      
    tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
      
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - prometheus
            topologyKey: kubernetes.io/hostname

# Grafana Configuration
grafana:
  enabled: true
  
  # Admin credentials
  adminUser: admin
  adminPassword: admin123
  
  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
    
  # Ingress configuration
  ingress:
    enabled: false
    hosts: []
    
  # Persistence configuration
  persistence:
    enabled: true
    storageClassName: standard
    accessModes: ["ReadWriteOnce"]
    size: 10Gi
    
  # Resource configuration
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
      
  # Sidecar configuration for dashboards and datasources
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
      folderAnnotation: grafana_folder
      provider:
        allowUiUpdates: true
        foldersFromFilesStructure: true
        
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
      label: grafana_datasource
      labelValue: "1"
      
  # Grafana configuration
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
      serve_from_sub_path: true
      
    auth:
      disable_login_form: false
      
    auth.anonymous:
      enabled: false
      
    users:
      allow_sign_up: false
      
    security:
      allow_embedding: false
      
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/home.json
      
  # Dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
          
  # Data sources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-service.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: true
        
# Alertmanager Configuration
alertmanager:
  enabled: true
  
  # Service configuration
  service:
    type: ClusterIP
    port: 9093
    targetPort: 9093
    
  # Ingress configuration
  ingress:
    enabled: false
    hosts: []
    
  # Persistence configuration
  alertmanagerSpec:
    retention: 120h
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
              
    # Resource configuration
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
        
    # Node selector and tolerations
    nodeSelector:
      kubernetes.io/os: linux
      
    tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
      
  # Alertmanager configuration
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'localhost:587'
      smtp_from: 'alerts@chat-app.com'
      
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'web.hook'
      routes:
      - match:
          severity: critical
        receiver: 'critical-alerts'
      - match:
          severity: warning
        receiver: 'warning-alerts'
        
    receivers:
    - name: 'web.hook'
      webhook_configs:
      - url: 'http://localhost:5001/'
        
    - name: 'critical-alerts'
      webhook_configs:
      - url: 'http://localhost:5001/critical'
        
    - name: 'warning-alerts'
      webhook_configs:
      - url: 'http://localhost:5001/warning'
        
    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'cluster', 'service']

# Node Exporter Configuration
nodeExporter:
  enabled: true
  
  # Service configuration
  service:
    type: ClusterIP
    port: 9100
    targetPort: 9100
    
  # Resource configuration
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
      
  # Host network and PID
  hostNetwork: true
  hostPID: true
  
  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    fsGroup: 65534
    
  # Node selector and tolerations
  nodeSelector:
    kubernetes.io/os: linux
    
  tolerations:
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# Kube State Metrics Configuration
kubeStateMetrics:
  enabled: true
  
  # Resource configuration
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi
      
  # Node selector and tolerations
  nodeSelector:
    kubernetes.io/os: linux
    
  tolerations:
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# Prometheus Operator Configuration
prometheusOperator:
  enabled: true
  
  # Resource configuration
  resources:
    requests:
      cpu: 200m
      memory: 200Mi
    limits:
      cpu: 500m
      memory: 500Mi
      
  # Node selector and tolerations
  nodeSelector:
    kubernetes.io/os: linux
    
  tolerations:
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
    
  # Admission webhooks
  admissionWebhooks:
    enabled: true
    patch:
      enabled: true
      
  # Prometheus configuration
  prometheusConfigReloader:
    resources:
      requests:
        cpu: 100m
        memory: 50Mi
      limits:
        cpu: 200m
        memory: 100Mi

# Additional monitoring components
kubelet:
  enabled: true
  
kubeControllerManager:
  enabled: true
  
coreDns:
  enabled: true
  
kubeEtcd:
  enabled: true
  
kubeScheduler:
  enabled: true
  
kubeProxy:
  enabled: true

# Default rules configuration
defaultRules:
  enabled: true
  rules:
    etcd: true
    general: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverError: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubeControllerManagerAvailability: true
    kubeControllerManagerError: true
    kubelet: true
    kubeProxy: true
    kubeScheduler: true
    kubeSchedulerAvailability: true
    kubeSchedulerError: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    network: true
    node: true
    prometheus: true
    prometheusOperator: true
    time: true
    
  # Labels for default rules
  labels: {}
  annotations: {}
  
  # Additional rule selectors
  additionalRuleLabels: {}
  
  # Runbook URLs
  runbookUrl: "https://github.com/kubernetes-monitoring/kubernetes-mixin/tree/master/runbook"

# Network policies
networkPolicy:
  enabled: false
  
# Pod security policies
podSecurityPolicy:
  enabled: false
